name: Update Package

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AU module
        run: |
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name AU -Force

      - name: Check for updates
        id: check
        working-directory: postman
        run: |
          Import-Module au

          try {
            $jsonReleaseNotesUri = 'https://dl.pstmn.io/api/version/notes?channel=stable'
            $jsonResponse = Invoke-RestMethod -Method Get -Uri $jsonReleaseNotesUri
            $latestVersion = [Version] $jsonResponse.notes[0].version
          } catch {
            Write-Error "Failed to fetch version information from Postman API: $_"
            exit 1
          }

          try {
            $nuspec = [xml](Get-Content postman.nuspec -ErrorAction Stop)
            $currentVersion = [Version] $nuspec.package.metadata.version
          } catch {
            Write-Error "Failed to read or parse postman.nuspec: $_"
            exit 1
          }

          if ($latestVersion -gt $currentVersion) {
            Write-Host "New version available: $latestVersion (current: $currentVersion)"
            "updated=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "version=$latestVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "Package is up to date at version $currentVersion"
            "updated=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Run AU update
        if: steps.check.outputs.updated == 'true'
        working-directory: postman
        run: |
          Import-Module au
          .\update.ps1

      - name: Build package
        if: steps.check.outputs.updated == 'true'
        working-directory: postman
        run: choco pack postman.nuspec

      - name: Push package to Chocolatey
        if: steps.check.outputs.updated == 'true'
        working-directory: postman
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          $nupkg = Get-ChildItem -Path *.nupkg | Select-Object -First 1
          if (-not $nupkg) {
            Write-Error "No .nupkg file found in the postman directory"
            exit 1
          }
          choco push $nupkg.FullName --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY

      - name: Commit and push changes
        if: steps.check.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update Postman to ${{ steps.check.outputs.version }}"
          git push
